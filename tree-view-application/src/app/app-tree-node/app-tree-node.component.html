<li>
  <!-- to show the expanding icons-->
  <span (click)="toggleNode()" [attr.tabindex]="0" (keydown)="onKeydown($event, node)" *ngIf="node!.childCount > 0">
    {{ node.isExpanded ? '▼' : '▶' }}
  </span>
  <!-- display node name-->
  <input type="checkbox" [(ngModel)]="node!.isSelected" (change)="onNodeSelect(node)" /> <span
    [innerHTML]="node.name"></span>

  <!-- display Loading while getting child nodes lazily-->
  <span *ngIf="node.isLoading">Loading...</span>

  <!-- iterating nodes and checking them-->
  <ul *ngIf="node.isExpanded" [@expandCollapse]="node.isExpanded ? 'expanded' : 'collapsed'">
    <ng-container *ngFor="let child of node.children">
      <!-- calling recursively to nested child nodes-->
      <app-tree-node [node]="child" [treeData]="treeData" (loadChildren)="loadChildren.emit($event)">
      </app-tree-node>
    </ng-container>
  </ul>
</li>
<!-- showing error message from API-->
<p class="no-data-message" *ngIf="!node.children">{{ errorMessage }}</p>
